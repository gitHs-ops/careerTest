<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:,">
  <title>로그인 — 진로심리검사</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(to bottom, #086266, #9adcda); min-height: 100vh;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* ── 카드 ── */
    .card {
      background: #fff;
      border-radius: 22px;
      box-shadow: 0 8px 48px rgba(80,72,212,0.11);
      padding: 32px 40px 36px;
      width: 100%;
      max-width: 440px;
      text-align: center;
    }

    .logo-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 6px; }
    .logo { font-size: 1.9rem; line-height: 1; }
    .title { font-size: 1.3rem; font-weight: 900; color: #1a1d2e; }
    .subtitle { font-size: 0.875rem; color: #5a607a; margin-bottom: 24px; white-space: nowrap; }

    /* ── 탭 ── */
    .tab-row {
      display: flex; gap: 0;
      border: 1.5px solid #E2E8F0; border-radius: 11px;
      overflow: hidden; margin-bottom: 22px;
    }
    .tab-btn {
      flex: 1; padding: 10px 8px;
      background: #F8FAFC; border: none;
      font-size: 0.82rem; font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      color: #94A3B8; cursor: pointer; transition: all .15s;
    }
    .tab-btn:first-child { border-right: 1.5px solid #E2E8F0; }
    .tab-btn.active { background: #5048d4; color: #fff; }

    /* ── 입력 ── */
    .form-group { margin-bottom: 14px; text-align: left; }
    .form-group label {
      display: block; font-size: 0.82rem; font-weight: 700;
      color: #475569; margin-bottom: 6px;
    }
    .form-group .req { color: #e53935; margin-left: 2px; }

    input[type="email"], input[type="tel"], input[type="password"] {
      width: 100%; padding: 13px 16px;
      border: 1.5px solid #E2E8F0; border-radius: 11px;
      font-size: 0.95rem; font-family: 'Noto Sans KR', sans-serif;
      outline: none; transition: border-color .2s;
      color: #1a1d2e; background: #F8FAFC;
    }
    input:focus { border-color: #5048d4; background: #fff; }
    .field-hint { font-size: 0.76rem; color: #94A3B8; margin-top: 4px; }

    /* ── 입력 구분선 ── */
    .divider-or {
      display: flex; align-items: center; gap: 10px;
      margin: 6px 0 14px; color: #94A3B8; font-size: .78rem;
    }
    .divider-or::before, .divider-or::after {
      content: ''; flex: 1; border-top: 1px solid #E2E8F0;
    }

    /* ── 버튼 ── */
    .btn-primary {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #5048d4, #7c6fe0);
      color: #fff; border: none; border-radius: 11px;
      font-size: 1rem; font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer; transition: opacity .2s, transform .1s;
      margin-bottom: 12px;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:active { transform: scale(0.98); }

    .btn-row { display: flex; gap: 10px; }
    .btn-secondary {
      flex: 1; padding: 12px 8px;
      border: 1.5px solid #E2E8F0; background: #F8FAFC;
      color: #475569; border-radius: 11px;
      font-size: 0.875rem; font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer; transition: all .2s;
    }
    .btn-secondary:hover { border-color: #5048d4; background: #EEEEFF; color: #5048d4; }

    /* ── 상태 메시지 ── */
    .status-msg {
      margin-top: 16px; padding: 12px 14px;
      border-radius: 9px; font-size: 0.85rem;
      line-height: 1.55; text-align: left; display: none;
    }
    .status-msg.error   { background: #FEE2E2; color: #DC2626; display: block; }
    .status-msg.warning { background: #FEF3C7; color: #B45309; display: block; }
    .status-msg.success { background: #DCFCE7; color: #16A34A; display: block; }
    .status-msg.info    { background: #EDE9FE; color: #5048d4;  display: block; }

    /* ── 처음이용자 완료 박스 ── */
    .msg-box {
      display: none; margin-top: 20px;
      background: #F0F4FF; border: 1px solid #C7D2FE;
      border-radius: 12px; padding: 18px; text-align: center;
    }
    .msg-box.active { display: block; }
    .msg-box-icon  { font-size: 1.8rem; margin-bottom: 6px; }
    .msg-box-title { font-weight: 800; color: #3730a3; margin-bottom: 5px; font-size: 0.92rem; }
    .msg-box-desc  { font-size: 0.82rem; color: #5a607a; line-height: 1.65; }

    /* ── 발송 상태 박스 ── */
    .send-results {
      display: none; margin-top: 14px;
      background: #F8FAFC; border: 1px solid #E2E8F0;
      border-radius: 10px; padding: 14px; text-align: left;
    }
    .send-results.active { display: block; }
    .send-result-item {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.8rem; color: #5a607a; margin-bottom: 6px;
    }
    .send-result-item:last-child { margin-bottom: 0; }
    .send-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .send-dot.ok  { background: #16A34A; }
    .send-dot.err { background: #DC2626; }
    .send-dot.loading { background: #94A3B8; animation: pulse .8s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── 모달 ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(15,23,42,.46); z-index: 100;
      align-items: center; justify-content: center; padding: 24px;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: #fff; border-radius: 18px;
      padding: 36px 30px 28px; max-width: 360px; width: 100%;
      text-align: center;
      box-shadow: 0 12px 48px rgba(0,0,0,0.18);
      animation: popIn .2s ease;
    }
    @keyframes popIn {
      from { transform: scale(.92); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    .modal-icon  { font-size: 2.2rem; margin-bottom: 8px; }
    .modal-title { font-size: 1.05rem; font-weight: 800; color: #1a1d2e; margin-bottom: 6px; }
    .modal-desc  { font-size: 0.84rem; color: #5a607a; line-height: 1.65; margin-bottom: 18px; }
    .modal .form-group { text-align: left; }
    .modal input[type="password"] { margin-bottom: 0; }

    .modal-status { display: none; margin: 10px 0 0; padding: 9px 12px; border-radius: 7px; font-size: 0.83rem; }
    .modal-status.error   { display: block; background: #FEE2E2; color: #DC2626; }
    .modal-status.success { display: block; background: #DCFCE7; color: #16A34A; }

    .modal-btn-row { display: flex; gap: 10px; margin-top: 18px; }
    .modal-btn-cancel {
      flex: 1; padding: 12px; background: #F1F5F9;
      color: #475569; border: none; border-radius: 9px;
      font-size: 0.9rem; font-weight: 600;
      font-family: 'Noto Sans KR', sans-serif; cursor: pointer;
    }
    .modal-btn-cancel:hover { background: #E2E8F0; }
    .modal-btn-confirm {
      flex: 1; padding: 12px;
      background: linear-gradient(135deg, #5048d4, #7c6fe0);
      color: #fff; border: none; border-radius: 9px;
      font-size: 0.9rem; font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif; cursor: pointer;
    }
    .modal-btn-confirm:hover { opacity: .9; }

    /* ── 토스트 ── */
    .toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: #333; color: #fff; padding: 9px 22px;
      border-radius: 20px; font-size: .82rem; font-weight: 600;
      z-index: 999; opacity: 0; transition: opacity .2s;
      pointer-events: none; white-space: nowrap;
    }
    .toast.show { opacity: 1; }

    @media (max-width: 480px) {
      .card { padding: 36px 20px 30px; }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo-row">
    <span class="logo">🧭</span>
    <span class="title">진로심리검사</span>
  </div>
  <div class="subtitle">이메일 또는 전화번호로 서비스를 시작하세요</div>

  <!-- 탭: 이메일 / 전화번호 -->
  <div class="tab-row">
    <button class="tab-btn active" id="tabEmail" onclick="switchTab('email')">✉️ 이메일</button>
    <button class="tab-btn"        id="tabPhone" onclick="switchTab('phone')">📱 전화번호</button>
  </div>

  <!-- 이메일 입력 -->
  <div id="fieldEmail">
    <div class="form-group">
      <label for="emailInput">이메일 주소 <span class="req">*</span></label>
      <input type="email" id="emailInput" placeholder="example@email.com"
        onkeydown="if(event.key==='Enter') handleStart()" />
    </div>
  </div>

  <!-- 전화번호 입력 -->
  <div id="fieldPhone" style="display:none;">
    <div class="form-group">
      <label for="phoneInput">전화번호 <span class="req">*</span></label>
      <input type="tel" id="phoneInput" placeholder="010-0000-0000"
        oninput="fmtPhone(this)"
        onkeydown="if(event.key==='Enter') handleStart()" />
      <div class="field-hint">숫자만 입력하면 자동으로 형식이 맞춰집니다</div>
    </div>
  </div>

  <div style="margin-bottom:6px;"></div>

  <button class="btn-primary" onclick="handleStart()">▶ 시작하기</button>

  <div class="btn-row">
    <button class="btn-secondary" onclick="openAdminModal()">🔧 관리자</button>
    <button class="btn-secondary" onclick="handleNewUser()">👋 처음 이용자</button>
  </div>

  <div class="status-msg" id="statusMsg"></div>

  <!-- 처음 이용자 완료 메시지 -->
  <div class="msg-box" id="newUserMsgBox">
    <div class="msg-box-icon">✉️</div>
    <div class="msg-box-title">이용 신청이 접수되었습니다</div>
    <div class="msg-box-desc">관리자 승인이 되면 답신 메일을 보내드릴게요.<br/>잠시만 기다려 주세요 😊</div>
  </div>

  <!-- 발송 결과 표시 -->
  <div class="send-results" id="sendResults">
    <div class="send-result-item" id="resultSms">
      <div class="send-dot loading" id="dotSms"></div>
      <span id="txtSms">SMS 발송 중...</span>
    </div>
    <div class="send-result-item" id="resultEmail">
      <div class="send-dot loading" id="dotEmail"></div>
      <span id="txtEmail">이메일 발송 중...</span>
    </div>
  </div>
</div>

<!-- ── 관리자 모달 ── -->
<div class="modal-overlay" id="adminModal">
  <div class="modal">
    <div class="modal-icon">🔧</div>
    <div class="modal-title">관리자 인증</div>
    <div class="modal-desc" id="adminModalDesc">관리자 암호를 입력해 주세요.</div>
    <div class="form-group">
      <label for="adminPwInput">관리자 암호</label>
      <input type="password" id="adminPwInput" placeholder="암호 입력"
        onkeydown="if(event.key==='Enter') confirmAdmin()" />
    </div>
    <div class="modal-status" id="adminStatus"></div>
    <div class="modal-btn-row">
      <button class="modal-btn-cancel" onclick="closeAdminModal()">취소</button>
      <button class="modal-btn-confirm" onclick="confirmAdmin()">확인</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════
// ① 설정값 — 필요시 수정
// ══════════════════════════════════════════════
const ADMIN_EMAIL    = 'khsq2011@gmail.com';
const ADMIN_PHONE    = '01026989056';          // 관리자 전화번호 (숫자만)
const ADMIN_PASSWORD = '1dl34';
const TARGET_PAGE    = 'career_index.html'; // 이동할 대상 페이지

// 솔라피 SMS GAS 프록시
const SOLAPI_SMS_PROXY_URL = 'https://script.google.com/macros/s/AKfycbzOmKHKIIQGCUFinZxvOZw0hGAWLZlP54PNefQTRSkrm5ShRpgEYo2XO7oHy8zbZIrvOw/exec';

// 구글 시트 프록시 (회원 조회/등록/이메일 발송)
const SHEET_PROXY_URL = 'https://script.google.com/macros/s/AKfycbwpAo91DiNXDl8oc1IqF-FFkyUwliwEsA4CdwSnhhNt71-fJRGIwuvUy9xsqYxmvskKyQ/exec';

// 관리자 수신 정보
const ADMIN_RECEIVER_EMAIL = 'khsq2011@gmail.com';
const ADMIN_RECEIVER_PHONE = '01026989056';

// ══════════════════════════════════════════════
// ② 탭 전환
// ══════════════════════════════════════════════
let currentTab = 'email'; // 'email' | 'phone'

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabEmail').classList.toggle('active', tab === 'email');
  document.getElementById('tabPhone').classList.toggle('active', tab === 'phone');
  document.getElementById('fieldEmail').style.display = tab === 'email' ? '' : 'none';
  document.getElementById('fieldPhone').style.display = tab === 'phone' ? '' : 'none';
  clearStatus();
  document.getElementById('newUserMsgBox').classList.remove('active');
  document.getElementById('sendResults').classList.remove('active');
}

// ══════════════════════════════════════════════
// ③ 유틸
// ══════════════════════════════════════════════
function getEmail() { return document.getElementById('emailInput').value.trim().toLowerCase(); }
function getPhone()  {
  return document.getElementById('phoneInput').value.replace(/[^0-9]/g, '');
}
function isValidEmail(e) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }
function isValidPhone(p)  { return /^01[016789]\d{7,8}$/.test(p); }

function fmtPhone(input) {
  let v = input.value.replace(/[^0-9]/g, '');
  if (v.length <= 3) input.value = v;
  else if (v.length <= 7) input.value = v.slice(0,3) + '-' + v.slice(3);
  else input.value = v.slice(0,3) + '-' + v.slice(3,7) + '-' + v.slice(7,11);
}

function showStatus(msg, type) {
  const el = document.getElementById('statusMsg');
  el.innerHTML = msg; el.className = 'status-msg ' + type;
}
function clearStatus() {
  const el = document.getElementById('statusMsg');
  el.className = 'status-msg'; el.textContent = '';
}
function showAdminStatus(msg, type) {
  const el = document.getElementById('adminStatus');
  el.textContent = msg; el.className = 'modal-status ' + type;
}
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2400);
}

function moveTo(page, identifier, identifierType, role) {
  const p = new URLSearchParams();
  p.set(identifierType, identifier); // 'email' or 'phone'
  if (role) p.set('role', role);
  window.location.href = page + '?' + p.toString();
}

// ══════════════════════════════════════════════
// ④ 시작하기 (구글 시트 회원 조회)
// ══════════════════════════════════════════════
async function handleStart() {
  clearStatus();
  document.getElementById('newUserMsgBox').classList.remove('active');
  document.getElementById('sendResults').classList.remove('active');

  const id = currentTab === 'email' ? getEmail() : getPhone();

  if (currentTab === 'email') {
    if (!id) { showStatus('⚠️ 이메일 주소를 입력해 주세요.', 'error'); return; }
    if (!isValidEmail(id)) { showStatus('⚠️ 올바른 이메일 형식이 아닙니다.', 'error'); return; }
    if (id === ADMIN_EMAIL) {
      showStatus('🔧 관리자 계정은 <b>관리자 버튼</b>으로 접속해 주세요.', 'warning'); return;
    }
  } else {
    if (!id) { showStatus('⚠️ 전화번호를 입력해 주세요.', 'error'); return; }
    if (!isValidPhone(id)) { showStatus('⚠️ 올바른 전화번호 형식이 아닙니다. (예: 010-1234-5678)', 'error'); return; }
    if (id === ADMIN_PHONE) {
      showStatus('🔧 관리자 계정은 <b>관리자 버튼</b>으로 접속해 주세요.', 'warning'); return;
    }
  }

  // 구글 시트에서 회원 조회
  showStatus('🔍 확인 중...', 'info');
  try {
    const qs  = new URLSearchParams({ action: 'check', id: id });
    const res = await fetch(`${SHEET_PROXY_URL}?${qs.toString()}`, { redirect: 'follow' });
    const data = await res.json();
    if (data.success) {
      clearStatus();
      moveTo(TARGET_PAGE, id, currentTab === 'email' ? 'email' : 'phone', 'user');
    } else {
      showStatus('❌ 등록되지 않은 계정입니다.<br>👋 <b>처음 이용자</b> 버튼으로 이용 신청을 해 주세요.', 'error');
    }
  } catch(e) {
    showStatus('⚠️ 서버 연결 오류입니다. 잠시 후 다시 시도해 주세요.', 'error');
  }
}

// ══════════════════════════════════════════════
// ⑤ 관리자 모달
// ══════════════════════════════════════════════
function openAdminModal() {
  const email = getEmail();
  const phone = getPhone();
  const id    = currentTab === 'email' ? email : phone;
  const isAdmin = (currentTab === 'email' && email === ADMIN_EMAIL)
               || (currentTab === 'phone' && phone === ADMIN_PHONE);

  if (!id) {
    showStatus(`⚠️ ${currentTab === 'email' ? '이메일 주소' : '전화번호'}를 먼저 입력해 주세요.`, 'error'); return;
  }
  if (currentTab === 'email' && !isValidEmail(email)) {
    showStatus('⚠️ 올바른 이메일 형식이 아닙니다.', 'error'); return;
  }
  if (currentTab === 'phone' && !isValidPhone(phone)) {
    showStatus('⚠️ 올바른 전화번호 형식이 아닙니다.', 'error'); return;
  }

  const label = currentTab === 'email' ? email : `010-${phone.slice(3,7)}-${phone.slice(7)}`;
  document.getElementById('adminModalDesc').innerHTML = isAdmin
    ? `<strong>${label}</strong><br/>관리자 암호 확인 후 관리자 모드로 접속합니다.`
    : `<strong>${label}</strong><br/>관리자 암호 확인 후 해당 ${currentTab === 'email' ? '이메일' : '전화번호'}을 신규 등록합니다.`;

  document.getElementById('adminPwInput').value = '';
  document.getElementById('adminStatus').className = 'modal-status';
  document.getElementById('adminStatus').textContent = '';
  document.getElementById('adminModal').classList.add('active');
  setTimeout(() => document.getElementById('adminPwInput').focus(), 100);
}

function closeAdminModal() { document.getElementById('adminModal').classList.remove('active'); }

async function confirmAdmin() {
  const pw    = document.getElementById('adminPwInput').value;
  const email = getEmail();
  const phone = getPhone();

  if (pw !== ADMIN_PASSWORD) { showAdminStatus('❌ 암호가 올바르지 않습니다.', 'error'); return; }

  closeAdminModal();
  clearStatus();

  if (currentTab === 'email') {
    if (email === ADMIN_EMAIL) {
      moveTo(TARGET_PAGE, email, 'email', 'admin');
    } else {
      // 구글 시트에 등록
      showStatus('⏳ 등록 중...', 'info');
      try {
        const qs  = new URLSearchParams({ action: 'register', id: email });
        const res = await fetch(`${SHEET_PROXY_URL}?${qs.toString()}`, { redirect: 'follow' });
        const data = await res.json();
        showStatus(`✅ '${email}' 이(가) 신규 이메일로 등록되었습니다.`, 'success');
      } catch(e) {
        showStatus('⚠️ 등록 중 오류가 발생했습니다.', 'error');
      }
    }
  } else {
    if (phone === ADMIN_PHONE) {
      moveTo(TARGET_PAGE, phone, 'phone', 'admin');
    } else {
      // 구글 시트에 등록
      showStatus('⏳ 등록 중...', 'info');
      try {
        const fmt = `010-${phone.slice(3,7)}-${phone.slice(7)}`;
        const qs  = new URLSearchParams({ action: 'register', id: phone });
        const res = await fetch(`${SHEET_PROXY_URL}?${qs.toString()}`, { redirect: 'follow' });
        const data = await res.json();
        showStatus(`✅ '${fmt}' 이(가) 신규 전화번호로 등록되었습니다.`, 'success');
      } catch(e) {
        showStatus('⚠️ 등록 중 오류가 발생했습니다.', 'error');
      }
    }
  }
}

// ══════════════════════════════════════════════
// ⑥ 처음 이용자 — GAS MailApp(이메일) / 솔라피(SMS)
// ══════════════════════════════════════════════
async function handleNewUser() {
  clearStatus();
  document.getElementById('newUserMsgBox').classList.remove('active');
  document.getElementById('sendResults').classList.remove('active');

  const email = getEmail();
  const phone = getPhone();
  const id    = currentTab === 'email' ? email : phone;

  if (!id) {
    showStatus(`⚠️ ${currentTab === 'email' ? '이메일 주소' : '전화번호'}를 먼저 입력해 주세요.`, 'error'); return;
  }
  if (currentTab === 'email') {
    if (!isValidEmail(email)) { showStatus('⚠️ 올바른 이메일 형식이 아닙니다.', 'error'); return; }
    if (email === ADMIN_EMAIL) { showStatus('🔧 관리자 계정은 관리자 버튼으로 접속해 주세요.', 'warning'); return; }
  } else {
    if (!isValidPhone(phone)) { showStatus('⚠️ 올바른 전화번호 형식이 아닙니다.', 'error'); return; }
    if (phone === ADMIN_PHONE) { showStatus('🔧 관리자 계정은 관리자 버튼으로 접속해 주세요.', 'warning'); return; }
  }

  // 이미 등록된 회원인지 확인
  try {
    const qs  = new URLSearchParams({ action: 'check', id: id });
    const res = await fetch(`${SHEET_PROXY_URL}?${qs.toString()}`, { redirect: 'follow' });
    const data = await res.json();
    if (data.success) {
      showStatus('✅ 이미 등록된 계정입니다. 시작하기 버튼을 눌러주세요.', 'info'); return;
    }
  } catch(e) { /* 조회 실패해도 신청 진행 */ }

  // 신청 메시지 구성
  const applicantLabel = currentTab === 'email' ? email
    : `010-${phone.slice(3,7)}-${phone.slice(7)}`;

  // 발송 결과 UI 표시 (탭에 따라 항목 표시/숨김)
  document.getElementById('sendResults').classList.add('active');
  document.getElementById('resultSms').style.display   = currentTab === 'phone' ? '' : 'none';
  document.getElementById('resultEmail').style.display = currentTab === 'email' ? '' : 'none';

  if (currentTab === 'email') {
    // 이메일 탭: GAS MailApp으로 관리자에게 이메일 발송
    setResult('Email', 'loading', '이메일 발송 중...');
    try {
      const qs  = new URLSearchParams({ action: 'notify', id: applicantLabel });
      const res = await fetch(`${SHEET_PROXY_URL}?${qs.toString()}`, { redirect: 'follow' });
      const data = await res.json();
      setResult('Email', data.success ? 'ok' : 'err',
        data.success ? '✉️ 이메일 발송 완료' : '✉️ 이메일 발송 실패');
    } catch(e) {
      setResult('Email', 'err', '✉️ 이메일 발송 실패');
    }
  } else {
    // 전화번호 탭: 관리자에게 SMS 발송 + 대기목록 저장
    setResult('Sms', 'loading', 'SMS 발송 중...');
    const applyMsg = `[진로심리검사 이용 신청]\n신청자: ${applicantLabel}\n\n승인 후 이용 가능하오니 검토 부탁드립니다.`;
    const smsOk = await sendSmsToAdmin(ADMIN_RECEIVER_PHONE, applyMsg);
    setResult('Sms', smsOk ? 'ok' : 'err', smsOk ? '📱 SMS 발송 완료' : '📱 SMS 발송 실패');
    // 대기목록 저장 (GAS notify - 이메일 발송 없이 저장만)
    try {
      const qs = new URLSearchParams({ action: 'notify', id: phone, smsOnly: '1' });
      await fetch(`${SHEET_PROXY_URL}?${qs.toString()}`, { redirect: 'follow' });
    } catch(e) { console.warn('대기목록 저장 실패:', e.message); }
  }

  // 완료 메시지
  document.getElementById('newUserMsgBox').classList.add('active');
}

function setResult(which, status, text) {
  const dot = document.getElementById('dot' + which);
  const txt = document.getElementById('txt'  + which);
  dot.className = 'send-dot ' + status;
  txt.textContent = text;
}

// ── 솔라피 SMS → GAS 프록시 GET 방식 (CORS 우회) ──
async function sendSmsToAdmin(receiverPhone, msg) {
  try {
    const qs  = new URLSearchParams({ receiver: receiverPhone, msg: msg });
    const res = await fetch(`${SOLAPI_SMS_PROXY_URL}?${qs.toString()}`, { redirect: 'follow' });
    const data = await res.json();
    return !!data.success;
  } catch (e) {
    console.error('SMS 발송 오류:', e);
    return false;
  }
}

// ══════════════════════════════════════════════
// ⑦ 모달 외부 클릭 닫기
// ══════════════════════════════════════════════
document.getElementById('adminModal').addEventListener('click', function(e) {
  if (e.target === this) closeAdminModal();
});
</script>
