<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>직업군 진로 어드바이저</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap');

:root {
  /* ── Light Theme Variables ── */
  --bg: #f4f6fb;
  --surface: #ffffff;
  --surface2: #f0f3fa;
  --surface3: #e8ecf6;
  --border: rgba(0,0,0,0.07);
  --border2: rgba(0,0,0,0.13);
  --border3: rgba(0,0,0,0.20);
  --text: #1a1d2e;
  --text-sub: #5a607a;
  --text-muted: #9299b8;
  --txt: #1a1d2e;
  --sub: #5a607a;
  --muted: #9299b8;
  --t1: #1a1d2e;
  --t2: #5a607a;
  --t3: #9299b8;
  /* sur / s 계열 */
  --sur: #ffffff;
  --sur2: #f0f3fa;
  --sur3: #e8ecf6;
  --s1: #ffffff;
  --s2: #f0f3fa;
  --s3: #e8ecf6;
  /* bord 계열 */
  --bord: rgba(0,0,0,0.07);
  --bord2: rgba(0,0,0,0.13);
  --bord3: rgba(0,0,0,0.20);
  --b1: rgba(0,0,0,0.07);
  --b2: rgba(0,0,0,0.13);
  --b3: rgba(0,0,0,0.20);
  /* 검사별 테마 - 라이트에 맞게 채도 유지 */
  --c-h: #6253c8; --c-h2: #4c3db8; --c-h-glow: rgba(98,83,200,0.18);
  --c-a: #1fa888; --c-a2: #158a6e; --c-a-glow: rgba(31,168,136,0.18);
  --c-v: #d04880; --c-v2: #b83268; --c-v-glow: rgba(208,72,128,0.18);
  --c-all:#d88020; --c-all2:#c06010; --c-all-glow:rgba(216,128,32,0.18);
  /* 강조색 계열 */
  --acc: #5048d4; --acc2: #6e64e8; --ag: rgba(80,72,212,0.15);
  --primary: #5048d4; --primary-light: #edeaff;
  --grn: #0da870; --grn2: #0c9060; --gg: rgba(13,168,112,0.15);
  --ylw: #d98a00; --ylw2: #b87200;
  --red: #d63030; --red2: #b82020;
  --pnk: #c83870; --pnk2: #b02860;
  --cyn: #0890b8; --cyn2: #0678a0;
  /* 흥미 유형 색상 */
  --R: #c83020; --I: #1860a8; --A: #7030a0;
  --S: #1a9050; --E: #c06020; --C: #0f7868;
  --H: #5048d4; --apt: #1a9a78; --val: #c83870;
  --gold: #c88020; --gold2: #a86010;

  --bg:#f4f6fb; --sur:#ffffff; --sur2:#f0f3fa; --sur3:#e8ecf6;
  --bord:rgba(255,255,255,.06); --bord2:rgba(255,255,255,.12); --bord3:rgba(255,255,255,.18);
  --txt:#1a1d2e; --sub:#7880a8; --muted:#9299b8;
  --acc:#6366f1; --acc2:#818cf8; --acc-glow:rgba(99,102,241,.3);
  --grn:#10b981; --grn2:#34d399; --grn-glow:rgba(16,185,129,.25);
  --ylw:#f59e0b; --ylw2:#fbbf24;
  --red:#ef4444; --red2:#f87171;
  --pnk:#ec4899; --pnk2:#f472b6;
  --radius:16px; --rsm:10px; --rxs:6px;
  --mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden;}

/* ── 배경 ── */
.bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.bg-g1{position:absolute;width:800px;height:800px;background:radial-gradient(circle,rgba(99,102,241,.12) 0%,transparent 70%);top:-200px;left:-200px;animation:bp 12s ease-in-out infinite;}
.bg-g2{position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(236,72,153,.08) 0%,transparent 70%);bottom:-100px;right:-100px;animation:bp 15s ease-in-out infinite 4s;}
.bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,0,0,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,0.04) 1px,transparent 1px);background-size:48px 48px;}
@keyframes bp{0%,100%{transform:scale(1) translate(0,0);}50%{transform:scale(1.1) translate(20px,-20px);}}

.wrap{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:0 22px 80px;}

/* ── HEADER ── */
.site-hd{display:flex;align-items:center;justify-content:space-between;padding:26px 0 0;margin-bottom:40px;}
.logo{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:800;color:var(--txt);text-decoration:none;cursor:pointer;}
.logo-mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--acc),var(--pnk));display:flex;align-items:center;justify-content:center;font-size:17px;}
.hd-right{display:flex;align-items:center;gap:10px;}
.api-status{display:flex;align-items:center;gap:6px;padding:6px 12px;background:var(--sur);border:1px solid var(--bord2);border-radius:30px;font-size:11px;font-weight:600;color:var(--sub);cursor:pointer;transition:all .2s;}
.api-status:hover{background:var(--sur2);color:var(--txt);}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--red);}
.status-dot.ok{background:var(--grn);}

/* ── API 설정 모달 ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(8px);}
.modal-overlay.open{display:flex;}
.modal{background:var(--sur);border:1px solid var(--bord2);border-radius:var(--radius);width:100%;max-width:440px;box-shadow:0 16px 48px rgba(0,0,0,.14);animation:mIn .25s ease;}
@keyframes mIn{from{opacity:0;transform:scale(.92) translateY(16px);}to{opacity:1;transform:scale(1) translateY(0);}}
.modal-hd{padding:24px 24px 16px;border-bottom:1px solid var(--bord);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:16px;font-weight:800;}
.btn-mclose{background:none;border:none;color:var(--sub);font-size:20px;cursor:pointer;line-height:1;}
.modal-body{padding:20px 24px;}
.m-label{font-size:12px;font-weight:700;color:var(--sub);margin-bottom:7px;}
.m-input{width:100%;padding:11px 14px;background:var(--sur2);border:1.5px solid var(--bord2);border-radius:var(--rsm);color:var(--txt);font-size:14px;font-family:var(--mono);outline:none;transition:border-color .2s;margin-bottom:14px;}
.m-input:focus{border-color:var(--acc);}
.m-hint{font-size:11px;color:var(--muted);line-height:1.6;margin-bottom:16px;}
.modal-ft{padding:0 24px 22px;display:flex;gap:8px;}
.btn-mcancel{flex:1;padding:11px;background:var(--sur2);border:1px solid var(--bord);border-radius:var(--rsm);color:var(--sub);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;}
.btn-msave{flex:2;padding:11px;background:linear-gradient(135deg,var(--acc),#8b5cf6);border:none;border-radius:var(--rsm);color:#fff;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;transition:filter .15s;}
.btn-msave:hover{filter:brightness(1.1);}

/* ── HERO ── */
.hero{text-align:center;padding:20px 0 48px;}
.hero-eyebrow{display:inline-flex;align-items:center;gap:7px;padding:6px 16px;border-radius:30px;background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.3);font-size:12px;font-weight:700;color:var(--acc2);margin-bottom:20px;letter-spacing:.4px;}
.hero-title{font-size:clamp(28px,5vw,52px);font-weight:900;line-height:1.15;margin-bottom:14px;background:linear-gradient(135deg,#fff 0%,#a5b4fc 50%,#f472b6 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hero-sub{font-size:15px;color:var(--sub);line-height:1.8;max-width:520px;margin:0 auto;}

/* ── 직업군 선택 ── */
.sec-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.sec-label::after{content:'';flex:1;height:1px;background:var(--bord);}

.job-select-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:36px;}
.job-sel-card{background:var(--sur);border:1.5px solid var(--bord);border-radius:var(--radius);padding:16px 14px;cursor:pointer;transition:all .2s;text-align:center;position:relative;overflow:hidden;}
.job-sel-card::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .2s;}
.job-sel-card:hover{border-color:var(--bord2);transform:translateY(-3px);}
.job-sel-card:hover::before{opacity:1;}
.job-sel-card.active{border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-glow);}
.job-sel-card.active::before{opacity:1;}
.jsc-em{font-size:26px;display:block;margin-bottom:8px;position:relative;}
.jsc-name{font-size:12px;font-weight:700;color:var(--txt);position:relative;line-height:1.4;}
.jsc-eng{font-size:10px;color:var(--sub);margin-top:3px;position:relative;font-family:var(--mono);}
.check-badge{position:absolute;top:8px;right:8px;width:18px;height:18px;border-radius:50%;background:var(--acc);display:none;align-items:center;justify-content:center;font-size:10px;}
.job-sel-card.active .check-badge{display:flex;}

/* 직접 입력 */
.custom-input-wrap{display:flex;gap:10px;margin-bottom:36px;}
.custom-inp{flex:1;padding:13px 16px;background:var(--sur);border:1.5px solid var(--bord2);border-radius:var(--rsm);color:var(--txt);font-size:14px;font-family:inherit;outline:none;transition:border-color .2s;}
.custom-inp:focus{border-color:var(--acc);}
.custom-inp::placeholder{color:var(--muted);}
.btn-custom{padding:13px 22px;background:linear-gradient(135deg,var(--acc),#8b5cf6);border:none;border-radius:var(--rsm);color:#fff;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap;transition:all .2s;box-shadow:0 4px 14px var(--acc-glow);}
.btn-custom:hover{transform:translateY(-1px);filter:brightness(1.1);}

/* ── 어드바이스 패널 ── */
.advice-panel{display:none;}
.advice-panel.show{display:block;animation:fadeUp .35s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

.adv-header{background:var(--sur);border:1px solid var(--bord2);border-radius:var(--radius);padding:28px 30px;margin-bottom:20px;display:flex;align-items:center;gap:20px;}
.adv-icon{width:64px;height:64px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:30px;flex-shrink:0;}
.adv-hd-info{flex:1;}
.adv-hd-title{font-size:22px;font-weight:900;margin-bottom:4px;}
.adv-hd-sub{font-size:13px;color:var(--sub);}
.adv-hd-tags{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap;}
.adv-tag{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:600;background:var(--sur2);color:var(--sub);border:1px solid var(--bord);}
.btn-regenerate{padding:10px 18px;background:var(--sur2);border:1px solid var(--bord2);border-radius:var(--rsm);color:var(--sub);font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:6px;}
.btn-regenerate:hover{background:var(--sur3);color:var(--txt);}

/* 탭 */
.tabs{display:flex;gap:4px;background:var(--sur);border:1px solid var(--bord);border-radius:var(--radius);padding:6px;margin-bottom:20px;}
.tab-btn{flex:1;padding:10px;border:none;border-radius:var(--rsm);background:transparent;color:var(--sub);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;}
.tab-btn:hover{background:var(--sur2);color:var(--txt);}
.tab-btn.active{background:var(--sur3);color:var(--txt);box-shadow:0 2px 8px rgba(0,0,0,.3);}

.tab-pane{display:none;}
.tab-pane.active{display:block;}

/* 콘텐츠 카드 */
.adv-card{background:var(--sur);border:1px solid var(--bord);border-radius:var(--radius);overflow:hidden;margin-bottom:16px;}
.adv-card-hd{padding:18px 22px 14px;border-bottom:1px solid var(--bord);display:flex;align-items:center;gap:10px;}
.adv-card-icon{font-size:20px;}
.adv-card-title{font-size:14px;font-weight:800;}
.adv-card-body{padding:18px 22px;}

/* AI 스트리밍 출력 */
.ai-output{font-size:14px;line-height:1.85;color:var(--txt);}
.ai-output h3{font-size:15px;font-weight:800;margin:18px 0 10px;color:var(--acc2);display:flex;align-items:center;gap:7px;}
.ai-output h3:first-child{margin-top:0;}
.ai-output p{margin-bottom:12px;color:var(--sub);}
.ai-output ul{list-style:none;display:flex;flex-direction:column;gap:7px;margin-bottom:14px;}
.ai-output ul li{display:flex;align-items:flex-start;gap:9px;font-size:13px;color:var(--sub);line-height:1.6;}
.ai-output ul li::before{content:'›';color:var(--acc2);font-size:16px;font-weight:800;flex-shrink:0;margin-top:1px;}
.ai-output strong{color:var(--txt);font-weight:700;}
.ai-output .tag-row{display:flex;flex-wrap:wrap;gap:7px;margin:10px 0;}
.ai-output .cert-tag{padding:6px 13px;border-radius:8px;font-size:12px;font-weight:700;background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.25);color:var(--acc2);}
.ai-output .dept-tag{padding:6px 13px;border-radius:8px;font-size:12px;font-weight:700;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);color:var(--grn2);}
.ai-output .job-tag{padding:6px 13px;border-radius:8px;font-size:12px;font-weight:700;background:rgba(236,72,153,.1);border:1px solid rgba(236,72,153,.2);color:var(--pnk2);}
.ai-output .salary-tag{padding:6px 13px;border-radius:8px;font-size:12px;font-weight:700;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);color:var(--ylw2);}
.ai-output .info-box{background:var(--sur2);border:1px solid var(--bord2);border-radius:var(--rsm);padding:14px 16px;margin:10px 0;font-size:13px;color:var(--sub);line-height:1.7;}
.ai-output .info-box .ib-title{font-size:12px;font-weight:800;color:var(--acc2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
.ai-output .road-step{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--bord);}
.ai-output .road-step:last-child{border-bottom:none;}
.ai-output .road-num{width:24px;height:24px;border-radius:50%;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0;margin-top:1px;}
.ai-output .road-content{}
.ai-output .road-title{font-size:13px;font-weight:700;color:var(--txt);margin-bottom:3px;}
.ai-output .road-desc{font-size:12px;color:var(--sub);line-height:1.6;}

/* 로딩 */
.loading-wrap{padding:40px 0;text-align:center;}
.loading-spinner{width:36px;height:36px;border:3px solid var(--bord2);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:13px;color:var(--sub);}
.loading-dots span{animation:blink 1.4s infinite;opacity:0;}
.loading-dots span:nth-child(2){animation-delay:.2s;}
.loading-dots span:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:0;}40%{opacity:1;}}

/* 커서 */
.cursor{display:inline-block;width:2px;height:14px;background:var(--acc2);margin-left:2px;vertical-align:middle;animation:blink2 .7s infinite;}
@keyframes blink2{0%,100%{opacity:1;}50%{opacity:0;}}

/* 급여 바 */
.salary-bar-wrap{margin:12px 0;}
.salary-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.salary-lbl{width:70px;font-size:11px;color:var(--sub);font-weight:600;flex-shrink:0;}
.salary-bg{flex:1;height:10px;background:var(--sur2);border-radius:5px;overflow:hidden;}
.salary-fill{height:100%;border-radius:5px;transition:width 1s ease;}
.salary-val{font-size:11px;font-family:var(--mono);font-weight:600;width:65px;text-align:right;flex-shrink:0;}

/* 전망 게이지 */
.gauge-wrap{display:flex;gap:14px;margin:12px 0;flex-wrap:wrap;}
.gauge-item{flex:1;min-width:140px;background:var(--sur2);border:1px solid var(--bord);border-radius:var(--rsm);padding:14px;}
.gauge-label{font-size:11px;color:var(--sub);margin-bottom:8px;font-weight:600;}
.gauge-stars{display:flex;gap:4px;}
.gauge-star{font-size:16px;}

/* toast */
.toast{position:fixed;bottom:28px;right:28px;background:var(--sur);border:1px solid var(--bord2);border-radius:var(--rsm);padding:12px 18px;font-size:13px;font-weight:600;box-shadow:0 8px 30px rgba(0,0,0,.4);z-index:999;animation:toastIn .3s ease;display:flex;align-items:center;gap:8px;}
@keyframes toastIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}

@media(max-width:700px){
  .job-select-grid{grid-template-columns:repeat(2,1fr);}
  .tabs{flex-wrap:wrap;}
  .tab-btn{font-size:11px;padding:8px 6px;}
  .adv-header{flex-direction:column;text-align:center;}
}
@media print{
  .site-hd,.tabs,.btn-regenerate,.custom-input-wrap,.job-select-grid,.sec-label,.hero,.bg{display:none!important;}
  .adv-panel{display:block!important;}
  body{background: var(--bg)!important;color:#000!important;}
}

/* ════ LIGHT THEME OVERRIDE ════ */
body { background: var(--bg) !important; color: var(--t1) !important; }

/* 배경 오브 / 그리드 투명도 조절 */
.orb, .glow, .mesh-orb { opacity: 0.07 !important; }
.bg-grid, .grid-pat {
  background-image: linear-gradient(rgba(0,0,0,.04) 1px,transparent 1px),
                    linear-gradient(90deg,rgba(0,0,0,.04) 1px,transparent 1px) !important;
}

/* 카드 / 서피스 */
.exam-card, .q-card, .q-card, .plan-card, .adv-card,
.form-card, .result-hero, .res-hero, .rh-top,
.sum-card, .algo-card, .jobs-rec-card, .advice-card,
.job-rec-card, .compare-table, .faq-item, .all-banner,
.type-card, .apt-detail-card, .orient-result-card,
.value-profile-card, .radar-card, .profile-card,
.adv-header, .job-sel-card, .i-card, .modal {
  background: #ffffff !important;
  border-color: rgba(0,0,0,0.10) !important;
  box-shadow: 0 2px 14px rgba(0,0,0,0.07) !important;
}
.exam-card:hover, .plan-card:hover, .job-sel-card:hover {
  box-shadow: 0 6px 24px rgba(0,0,0,0.12) !important;
}

/* 서피스2 요소 */
.meta-chip, .type-tag, .card-types .type-tag,
.sum-tag, .adv-tag, .modal-info-chip,
.jrc-job, .all-tag, .td-file,
.all-tag, .nav-chip, .hd-btn, .api-status,
.sms-preview, .question-card,
.score-bar-track, .vbl-track, .prog-bg,
.prog-bar-bg, .profile-track, .salary-bg,
.likert-wrap, .q-hd, .q-head,
.faq-a, .adc-tag, .orc-val-tag, .adv-tag,
.gauge-item, .action-item, .chk-item,
.priority-box, .info-box, .tl-step,
.intro-stats, .hero-stats, .modal-info-row,
.sender-info, .selected-bar,
.lk-ball, .likert-ball, .likert-dot {
  background: #f0f3fa !important;
  border-color: rgba(0,0,0,0.10) !important;
}

/* 입력 필드 */
input, select, textarea,
.finput, .fselect, .ftextarea,
.modal-name-input, .modal-select-input,
.minput, .m-input,
.name-inp, .name-input,
.search-input, .custom-inp,
.form-input, .form-select, .form-textarea {
  background: #ffffff !important;
  border-color: rgba(0,0,0,0.15) !important;
  color: #1a1d2e !important;
}
input::placeholder, textarea::placeholder { color: #9299b8 !important; }
select option { background: #ffffff !important; color: #1a1d2e !important; }

/* 텍스트 */
.text-sub, .card-sub, .hero-sub, .intro-sub,
p, .t2, .sub, .text-muted, .muted,
.q-text, .q-txt, .lk-sc, .likert-scale,
.exam-hd-sub, .pc-sub, .adv-hd-sub,
.jrc-desc, .jrc-eng, .adc-desc,
.orc-desc, .adv-card-title, .faq-a,
.algo-step, .ai-out p, .ai-out li,

<script>
// ══════════════════════════════════════════
// 직업군 DB
// ══════════════════════════════════════════
const JOB_LIST = [
  {id:'IT_DEV',    name:'IT·소프트웨어',    eng:'Software & IT',    emoji:'💻', color:'#3b82f6', tags:['기술','논리','창의']},
  {id:'SCIENCE',   name:'과학·연구',        eng:'Science & Research',emoji:'🔬', color:'#6366f1', tags:['탐구','분석','혁신']},
  {id:'ARTS',      name:'예술·디자인',      eng:'Arts & Design',    emoji:'🎨', color:'#a855f7', tags:['창의','감성','표현']},
  {id:'MEDIA',     name:'미디어·콘텐츠',    eng:'Media & Content',  emoji:'📺', color:'#ec4899', tags:['소통','창의','영향력']},
  {id:'EDU',       name:'교육·상담',        eng:'Education',        emoji:'📚', color:'#22c55e', tags:['봉사','소통','성장']},
  {id:'MEDICAL',   name:'의료·보건',        eng:'Medical',          emoji:'🏥', color:'#14b8a6', tags:['봉사','과학','책임']},
  {id:'BUSINESS',  name:'경영·비즈니스',    eng:'Business',         emoji:'📊', color:'#f97316', tags:['리더십','전략','성취']},
  {id:'LAW',       name:'법률·공공행정',    eng:'Law & Public',     emoji:'⚖️', color:'#64748b', tags:['정의','논리','책임']},
  {id:'ENG',       name:'공학·건축',        eng:'Engineering',      emoji:'🏗️', color:'#84cc16', tags:['설계','기술','혁신']},
  {id:'FINANCE',   name:'금융·경제',        eng:'Finance',          emoji:'💰', color:'#eab308', tags:['분석','전략','안정']},
  {id:'SPORTS',    name:'스포츠·건강',      eng:'Sports & Wellness',emoji:'🏅', color:'#ef4444', tags:['체력','열정','성취']},
  {id:'NATURE',    name:'자연·환경',        eng:'Nature & Env',     emoji:'🌿', color:'#10b981', tags:['탐구','봉사','자연']},
  {id:'MUSIC',     name:'음악·공연예술',    eng:'Music & Arts',     emoji:'🎵', color:'#8b5cf6', tags:['감성','창의','표현']},
  {id:'CRAFT',     name:'요리·공예',        eng:'Culinary & Craft', emoji:'🍳', color:'#f59e0b', tags:['손재능','창의','감성']},
];

// ══════════════════════════════════════════
// 상태
// ══════════════════════════════════════════
const PROXY_URL = 'https://script.google.com/macros/s/AKfycbzNRgaE-O9wiS0amF1F1AEJBlqDJhEdDlIS0fNnfmSIbelvdmCDHc4q7pRgc4Xp_AuHag/exec';
let currentJob = null;
let tabCache = {};

// ══════════════════════════════════════════
// 초기화
// ══════════════════════════════════════════
(function init(){
  renderJobGrid();
  updateApiStatus();
  // URL 파라미터 ?job=ID 로 직업군 자동 선택
  const params = new URLSearchParams(location.search);
  const jobId = params.get('job');
  if(jobId) setTimeout(()=>selectJob(jobId), 100);
})();

function renderJobGrid(){
  const grid = document.getElementById('jobSelectGrid');
  grid.innerHTML = JOB_LIST.map(j => `
    <div class="job-sel-card" id="jsc_${j.id}" onclick="selectJob('${j.id}')">
      <div class="check-badge">✓</div>
      <span class="jsc-em">${j.emoji}</span>
      <div class="jsc-name">${j.name}</div>
      <div class="jsc-eng">${j.eng}</div>
    </div>`).join('');
  // 호버 색상 동적 주입
  JOB_LIST.forEach(j=>{
    const el = document.getElementById('jsc_'+j.id);
    el.addEventListener('mouseenter',()=>{ el.style.borderColor=j.color+'60'; });
    el.addEventListener('mouseleave',()=>{ if(!el.classList.contains('active')) el.style.borderColor=''; });
  });
}

// ══════════════════════════════════════════
// API 연결 (GAS 프록시)
// ══════════════════════════════════════════
function updateApiStatus(){ /* 프록시 자동 연결 */ }
function openModal(){}
function closeModal(){}

// ══════════════════════════════════════════
// 직업군 선택
// ══════════════════════════════════════════
function selectJob(id){
  const job = JOB_LIST.find(j=>j.id===id);
  if(!job) return;
  document.querySelectorAll('.job-sel-card').forEach(c=>{
    c.classList.remove('active'); c.style.borderColor=''; c.style.boxShadow='';
  });
  const el = document.getElementById('jsc_'+id);
  el.classList.add('active');
  el.style.borderColor = job.color;
  el.style.boxShadow = `0 0 0 3px ${job.color}30`;
  currentJob = { ...job, custom: false };
  tabCache = {};
  showAdvicePanel(job);
  document.getElementById('customJobInp').value='';
}

function customSearch(){
  const val = document.getElementById('customJobInp').value.trim();
  if(!val){ showToast('⚠️ 직업명을 입력해 주세요','warn'); return; }
  document.querySelectorAll('.job-sel-card').forEach(c=>{ c.classList.remove('active'); c.style.borderColor=''; });
  currentJob = { id:'custom', name:val, eng:val, emoji:'🔍', color:'#6366f1',
    tags:['진로탐색'], custom:true };
  tabCache = {};
  showAdvicePanel(currentJob);
}

function regenerate(){
  if(!currentJob) return;
  tabCache = {};
  const activeTab = document.querySelector('.tab-pane.active');
  if(activeTab) loadTab(activeTab.id.replace('tab-',''));
}

// ══════════════════════════════════════════
// 어드바이스 패널
// ══════════════════════════════════════════
function showAdvicePanel(job){
  const panel = document.getElementById('advicePanel');
  document.getElementById('advIcon').textContent = job.emoji;
  document.getElementById('advIcon').style.background = `linear-gradient(135deg,${job.color}40,${job.color}20)`;
  document.getElementById('advTitle').textContent = job.name + ' 직업군';
  document.getElementById('advSub').textContent = `${job.eng} — AI 진로 분석 리포트`;
  document.getElementById('advTags').innerHTML = job.tags.map(t=>`<span class="adv-tag">${t}</span>`).join('');

function loadTab(tabId){
  if(tabCache[tabId]){
    document.getElementById('tab-'+tabId).innerHTML = tabCache[tabId];
    return;
  }

  showLoading(tabId);
  const prompt = buildPrompt(tabId, currentJob);
  callClaude(prompt, tabId);
}



function showLoading(tabId){
  document.getElementById('tab-'+tabId).innerHTML = `
    <div class="loading-wrap">
      <div class="loading-spinner"></div>
      <div class="loading-text">AI가 <strong>${currentJob.name}</strong> 정보를 분석하는 중<span class="loading-dots"><span>.</span><span>.</span><span>.</span></span></div>

const loadingTimers = {};
function startLoadingAnim(tabId){
  const msgs=['Claude API에 요청 중...','직업 정보를 수집하는 중...','한국 실정에 맞게 분석 중...','상세 내용을 정리하는 중...','거의 완료되었습니다...'];
  let elapsed=0; const TOTAL=28;
  loadingTimers[tabId]=setInterval(()=>{
    elapsed++;
    const pct=Math.min(95,Math.round((elapsed/TOTAL)*100));
    const progEl=document.getElementById('loadProg_'+tabId);
    const pctEl=document.getElementById('loadPct_'+tabId);
    const timeEl=document.getElementById('loadTime_'+tabId);
    const msgEl=document.getElementById('loadMsg_'+tabId);
    if(!progEl){clearInterval(loadingTimers[tabId]);return;}
    progEl.style.width=pct+'%';
    pctEl.textContent=pct+'%';
    timeEl.textContent=elapsed+'초 경과';
    msgEl.textContent=msgs[Math.min(msgs.length-1,Math.floor(elapsed/(TOTAL/msgs.length)))];
  },1000);
}
function stopLoadingAnim(tabId){
  clearInterval(loadingTimers[tabId]);
  const p=document.getElementById('loadProg_'+tabId);
  const pc=document.getElementById('loadPct_'+tabId);
  if(p) p.style.width='100%';
  if(pc) pc.textContent='100%';
}

// ── Claude API 호출 (직접 전달 방식) ──
async function callClaude(prompt, tabId){
  const TAB_TOKENS={overview:1500,cert:2000,dept:2000,roadmap:2500,salary:1500};
  const maxTokens=TAB_TOKENS[tabId]||1500;
  const container=document.getElementById('tab-'+tabId);
  showLoading(tabId);
  try {
    const res=await fetch(PROXY_URL+'?prompt='+encodeURIComponent(prompt)+'&max_tokens='+maxTokens,{method:'GET'});
    if(!res.ok) throw new Error(`서버 오류 (${res.status})`);
    const data=await res.json();
    if(data.error) throw new Error(data.error);
    stopLoadingAnim(tabId);
    container.innerHTML=`<div class="adv-card"><div class="adv-card-body"><div class="ai-output">${data.text||''}</div></div></div>`;
    tabCache[tabId]=container.innerHTML;
    if(data.usage) updateTokenTracker(data.usage);
  } catch(e){
    stopLoadingAnim(tabId);
    container.innerHTML=`<div class="adv-card"><div class="adv-card-body" style="text-align:center;padding:30px">
      <div style="font-size:32px;margin-bottom:12px">⚠️</div>
      <div style="font-size:14px;font-weight:700;margin-bottom:8px;color:#f87171">분석 중 오류가 발생했습니다</div>
      <div style="font-size:12px;color:var(--sub);margin-bottom:16px">${e.message}</div>
      <button onclick="loadTab('${tabId}')" style="padding:9px 20px;background:var(--sur2);border:1px solid var(--bord2);border-radius:var(--rsm);color:var(--sub);font-size:12px;font-weight:700;font-family:inherit;cursor:pointer">다시 시도</button>
    </div></div>`;
  }
}

// 유틸
// ══════════════════════════════════════════
function showToast(msg, type=''){
  const t = document.createElement('div');
  t.className = 'toast';
  const icons = {error:'❌', warn:'⚠️'};
  t.innerHTML = `${icons[type]||'✅'} ${msg}`;
  if(type==='error') t.style.borderColor='rgba(239,68,68,.4)';
  if(type==='warn') t.style.borderColor='rgba(245,158,11,.4)';
  document.body.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transition='opacity .4s'; },3000);
  setTimeout(()=>t.remove(),3500);
}

// ── 토큰 사용량 추적 ──
const TOKEN_WARN_YELLOW=50000;
const TOKEN_WARN_RED=100000;
function getTodayKey(){return 'tokenUsage_'+new Date().toISOString().slice(0,10);}
function getGrandTotal(){
  let t=0;
  for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith('tokenUsage_'))t+=parseInt(localStorage.getItem(k)||'0');}
  return t;
}
function updateGrandTotal(){const el=document.getElementById('tk-grand');if(el){const g=getGrandTotal();el.textContent=g>0?g.toLocaleString()+' 토큰':'-';}}
function updateTokenTracker(usage){
  if(!usage)return;
  const inp=usage.input_tokens||0, out=usage.output_tokens||0, req=inp+out;
  const key=getTodayKey();
  const total=parseInt(localStorage.getItem(key)||'0')+req;
  localStorage.setItem(key,total);
  const tracker=document.getElementById('token-tracker');
  if(tracker)tracker.classList.add('show');
  const tkReq=document.getElementById('tk-req');
  const tkTotal=document.getElementById('tk-total');
  if(tkReq)tkReq.textContent=`입력 ${inp.toLocaleString()} + 출력 ${out.toLocaleString()} = ${req.toLocaleString()} 토큰`;
  if(tkTotal)tkTotal.textContent=total.toLocaleString()+' 토큰';
  updateGrandTotal();
  const pct=Math.min(total/TOKEN_WARN_RED*100,100);
  const tkBar=document.getElementById('tk-bar');
  if(tkBar){tkBar.style.width=pct+'%';if(pct>=70)tkBar.style.background='linear-gradient(90deg,#f0a030,#ef4444)';}
  const warn=document.getElementById('tk-warn');
  if(warn){
    warn.className='token-warn';
    if(total>=TOKEN_WARN_RED){warn.className='token-warn red';warn.textContent='⚠️ 오늘 사용량이 10만 토큰을 넘었습니다.';}
    else if(total>=TOKEN_WARN_YELLOW){warn.className='token-warn yellow';warn.textContent='⚡ 오늘 사용량이 5만 토큰을 넘었습니다.';}
  }
}
function resetTokenCount(){
  localStorage.removeItem(getTodayKey());
  ['tk-req','tk-total'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent='-';});
  const b=document.getElementById('tk-bar');if(b){b.style.width='0%';b.style.background='linear-gradient(90deg,#7c3aed,#4a9eff)';}
  const w=document.getElementById('tk-warn');if(w)w.className='token-warn';
  updateGrandTotal();
  if(getGrandTotal()===0){const t=document.getElementById('token-tracker');if(t)t.classList.remove('show');}
}
function resetAllTokenCount(){
  const keys=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith('tokenUsage_'))keys.push(k);}
  keys.forEach(k=>localStorage.removeItem(k));resetTokenCount();
}
