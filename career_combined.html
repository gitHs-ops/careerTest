<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>진로심리검사 종합 결과 - 직업군 추천</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@500&display=swap');
:root {
  /* ── Light Theme Variables ── */
  --bg: #f4f6fb;
  --surface: #ffffff;
  --surface2: #f0f3fa;
  --surface3: #e8ecf6;
  --border: rgba(0,0,0,0.07);
  --border2: rgba(0,0,0,0.13);
  --border3: rgba(0,0,0,0.20);
  --text: #1a1d2e;
  --text-sub: #5a607a;
  --text-muted: #9299b8;
  --txt: #1a1d2e;
  --sub: #5a607a;
  --muted: #9299b8;
  --t1: #1a1d2e;
  --t2: #5a607a;
  --t3: #9299b8;
  /* sur / s 계열 */
  --sur: #ffffff;
  --sur2: #f0f3fa;
  --sur3: #e8ecf6;
  --s1: #ffffff;
  --s2: #f0f3fa;
  --s3: #e8ecf6;
  /* bord 계열 */
  --bord: rgba(0,0,0,0.07);
  --bord2: rgba(0,0,0,0.13);
  --bord3: rgba(0,0,0,0.20);
  --b1: rgba(0,0,0,0.07);
  --b2: rgba(0,0,0,0.13);
  --b3: rgba(0,0,0,0.20);
  /* 검사별 테마 - 라이트에 맞게 채도 유지 */
  --c-h: #6253c8; --c-h2: #4c3db8; --c-h-glow: rgba(98,83,200,0.18);
  --c-a: #1fa888; --c-a2: #158a6e; --c-a-glow: rgba(31,168,136,0.18);
  --c-v: #d04880; --c-v2: #b83268; --c-v-glow: rgba(208,72,128,0.18);
  --c-all:#d88020; --c-all2:#c06010; --c-all-glow:rgba(216,128,32,0.18);
  /* 강조색 계열 */
  --acc: #5048d4; --acc2: #6e64e8; --ag: rgba(80,72,212,0.15);
  --primary: #5048d4; --primary-light: #edeaff;
  --grn: #0da870; --grn2: #0c9060; --gg: rgba(13,168,112,0.15);
  --ylw: #d98a00; --ylw2: #b87200;
  --red: #d63030; --red2: #b82020;
  --pnk: #c83870; --pnk2: #b02860;
  --cyn: #0890b8; --cyn2: #0678a0;
  /* 흥미 유형 색상 */
  --R: #c83020; --I: #1860a8; --A: #7030a0;
  --S: #1a9050; --E: #c06020; --C: #0f7868;
  --H: #5048d4; --apt: #1a9a78; --val: #c83870;
  --gold: #c88020; --gold2: #a86010;

  --bg:#f4f6fb; --sur:#ffffff; --sur2:#e8ecf6; --bord:rgba(255,255,255,.07); --bord2:rgba(255,255,255,.13);
  --txt:#1a1d2e; --sub:#5a607a; --muted:#9299b8;
  --H:#7c6fe0; --I:#2980b9; --A:#8e44ad; --S:#27ae60; --E:#e67e22; --C:#16a085;
  --apt:#3eb8a0; --val:#e06090;
  --gold:#f0a050; --gold2:#ffd090;
  --radius:18px; --rsm:12px; --rxs:8px;
  --shadow:0 4px 20px rgba(0,0,0,.3);
  --shadow-lg:0 12px 50px rgba(0,0,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden;}

/* ── BG ── */
.bg-mesh{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
.mesh-orb{position:absolute;border-radius:50%;filter:blur(100px);opacity:.08;}
.o1{width:600px;height:600px;background:#7c6fe0;top:-200px;left:-150px;animation:fl 9s ease-in-out infinite;}
.o2{width:450px;height:450px;background:#3eb8a0;bottom:-100px;right:-100px;animation:fl 11s ease-in-out infinite 3s;}
.o3{width:380px;height:380px;background:#e06090;top:45%;left:45%;animation:fl 13s ease-in-out infinite 6s;}
@keyframes fl{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-28px) scale(1.05);}}

/* ── WRAP ── */
.wrap{position:relative;z-index:1;max-width:820px;margin:0 auto;padding:0 20px 80px;}

/* ── PROGRESS STEPPER ── */
.stepper{display:flex;align-items:center;justify-content:center;padding:32px 0 0;gap:0;margin-bottom:48px;}
.step{display:flex;flex-direction:column;align-items:center;gap:6px;position:relative;}
.step-circle{width:40px;height:40px;border-radius:50%;border:2px solid var(--bord2);background:var(--sur);
  display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .3s;font-weight:700;}
.step.done .step-circle{background:var(--S);border-color:var(--S);color:#fff;}
.step.active .step-circle{border-color:var(--H);box-shadow:0 0 0 4px rgba(124,111,224,.25);}
.step.active.aptStep .step-circle{border-color:var(--apt);box-shadow:0 0 0 4px rgba(62,184,160,.25);}
.step.active.valStep .step-circle{border-color:var(--val);box-shadow:0 0 0 4px rgba(224,96,144,.25);}
.step.active.resStep .step-circle{border-color:var(--gold);box-shadow:0 0 0 4px rgba(240,160,80,.25);}
.step-label{font-size:11px;font-weight:700;color:var(--muted);white-space:nowrap;}
.step.active .step-label{color:var(--txt);}
.step.done .step-label{color:var(--sub);}
.step-line{width:60px;height:2px;background:var(--bord2);margin-bottom:22px;transition:background .5s;}
.step-line.done{background:var(--S);}
@media(max-width:500px){.step-line{width:30px;}.step-label{font-size:9px;}}

/* ── SCREENS ── */
.screen{display:none;}
.screen.active{display:block;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

/* ── INTRO ── */
.intro-hero{text-align:center;padding:20px 0 48px;}
.intro-eyebrow{display:inline-flex;align-items:center;gap:7px;padding:6px 16px;border-radius:30px;
  background:rgba(124,111,224,.15);border:1px solid rgba(124,111,224,.3);
  font-size:12px;font-weight:700;color:#b8b0ff;margin-bottom:22px;letter-spacing:.4px;}
.intro-title{font-size:clamp(30px,6vw,52px);font-weight:900;line-height:1.18;margin-bottom:16px;
  background:linear-gradient(135deg,#fff 0%,#b8b0ff 45%,#ffaad0 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.intro-sub{font-size:15px;color:var(--sub);line-height:1.8;max-width:520px;margin:0 auto 36px;}
.intro-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:36px;}
.i-card{background:var(--sur);border:1px solid var(--bord2);border-radius:var(--rsm);padding:20px 16px;text-align:center;}
.i-card-em{font-size:28px;margin-bottom:8px;}
.i-card-title{font-size:13px;font-weight:800;margin-bottom:4px;}
.i-card-meta{font-size:11px;color:var(--sub);}
.name-row{display:flex;gap:12px;max-width:400px;margin:0 auto;}
.name-inp{flex:1;padding:13px 16px;background:var(--sur);border:1.5px solid var(--bord2);
  border-radius:var(--rsm);color:var(--txt);font-size:15px;font-family:inherit;outline:none;transition:border-color .2s;}
.name-inp:focus{border-color:var(--H);}
.name-inp::placeholder{color:var(--muted);}
.btn-go{padding:13px 28px;background:linear-gradient(135deg,var(--H),#b06af0);color:#fff;
  border:none;border-radius:var(--rsm);font-size:14px;font-weight:700;font-family:inherit;
  cursor:pointer;white-space:nowrap;transition:all .2s;box-shadow:0 4px 16px rgba(124,111,224,.35);}
.btn-go:hover{transform:translateY(-2px);filter:brightness(1.1);}

/* ── EXAM HEADER ── */
.exam-hd{background:var(--sur);border:1px solid var(--bord);border-radius:var(--radius);
  padding:18px 24px;margin-bottom:16px;display:flex;align-items:center;gap:16px;}
.exam-hd-left{flex:1;}
.exam-hd-title{font-size:15px;font-weight:800;}
.exam-hd-sub{font-size:12px;color:var(--sub);margin-top:3px;}
.prog-bg{height:7px;background:var(--bord2);border-radius:4px;overflow:hidden;margin-top:10px;}
.prog-fill{height:100%;border-radius:4px;transition:width .4s;}
.prog-lbl{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:4px;}

/* ── DOTS ── */
.dots{display:flex;gap:5px;justify-content:center;margin:12px 0;flex-wrap:wrap;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--bord2);transition:all .2s;}
.dot.done{background:rgba(255,255,255,.4);}
.dot.cur{width:18px;border-radius:3px;}

/* ── SECTION DIVIDER ── */
.sec-div{border-radius:var(--rsm);padding:14px 20px;margin-bottom:14px;display:flex;align-items:center;gap:12px;border:1.5px solid;}
.sec-div-icon{font-size:26px;flex-shrink:0;}
.sec-div-title{font-size:15px;font-weight:800;}
.sec-div-desc{font-size:12px;margin-top:2px;opacity:.8;}

/* ── Q CARD ── */
.q-card{background:var(--sur);border:1px solid var(--bord);border-radius:var(--radius);
  margin-bottom:10px;overflow:hidden;animation:fadeUp .2s ease;}
.q-hd{padding:14px 20px 10px;border-bottom:1px solid var(--bord);display:flex;align-items:flex-start;gap:10px;}
.q-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;color:#fff;flex-shrink:0;margin-top:2px;}
.q-txt{font-size:14px;font-weight:600;line-height:1.6;flex:1;}
.q-tag{padding:3px 9px;border-radius:10px;font-size:10px;font-weight:700;white-space:nowrap;flex-shrink:0;margin-top:2px;}
.likert{padding:12px 20px;display:flex;align-items:center;gap:8px;}
.lbl{font-size:11px;color:var(--muted);white-space:nowrap;}
.opts{display:flex;gap:7px;flex:1;justify-content:center;}
.opt{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;}
.lk-radio{display:none;}
.lk-ball{width:34px;height:34px;border-radius:50%;border:2px solid var(--bord2);display:flex;
  align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--sub);
  transition:all .15s;cursor:pointer;background:var(--sur2);}
.lk-radio:checked+.lk-ball{border-color:var(--H);background:var(--H);color:#fff;transform:scale(1.12);
  box-shadow:0 2px 8px rgba(124,111,224,.4);}
.lk-ball.apt-active{border-color:var(--apt)!important;background:var(--apt)!important;box-shadow:0 2px 8px rgba(62,184,160,.4)!important;}
.lk-ball.val-active{border-color:var(--val)!important;background:var(--val)!important;box-shadow:0 2px 8px rgba(224,96,144,.4)!important;}
.lk-sc{font-size:9px;color:var(--muted);text-align:center;}

/* ── NAV ── */
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn-prev{padding:10px 20px;background:var(--sur);border:1px solid var(--bord2);border-radius:var(--rsm);
  color:var(--sub);font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .15s;}
.btn-prev:hover{background:var(--sur2);color:var(--txt);}
.ans-st{font-size:12px;color:var(--muted);}
.btn-next{padding:10px 26px;border:none;border-radius:var(--rsm);color:#fff;font-size:13px;
  font-weight:700;font-family:inherit;cursor:pointer;transition:all .2s;box-shadow:0 3px 10px rgba(0,0,0,.3);}
.btn-next:disabled{background:var(--bord2)!important;cursor:not-allowed;transform:none!important;box-shadow:none!important;}

/* ── RESULT ── */
.res-hero{background:linear-gradient(135deg,#f0eeff,#f5f0ff);border:1px solid var(--bord2);
  border-radius:var(--radius);padding:40px 36px;text-align:center;margin-bottom:22px;
  position:relative;overflow:hidden;}
.res-hero::before{content:'';position:absolute;inset:0;background:
  radial-gradient(circle at 20% 20%,rgba(124,111,224,.2) 0%,transparent 50%),
  radial-gradient(circle at 80% 80%,rgba(224,96,144,.2) 0%,transparent 50%);pointer-events:none;}
.rh-label{font-size:13px;color:var(--sub);margin-bottom:6px;position:relative;}
.rh-name{font-size:24px;font-weight:900;margin-bottom:20px;position:relative;}
.rh-badges{display:flex;justify-content:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;position:relative;}
.rh-badge{padding:8px 18px;border-radius:30px;font-size:13px;font-weight:700;border:1.5px solid;}
.rh-sub{font-size:13px;color:var(--sub);line-height:1.7;position:relative;}

/* 직업군 추천 카드 */
.job-rec-section{margin-bottom:22px;}
.sec-title{font-size:16px;font-weight:800;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.job-rec-grid{display:flex;flex-direction:column;gap:14px;}
.job-rec-card{background:var(--sur);border:1px solid var(--bord);border-radius:var(--radius);
  padding:24px 26px;transition:all .25s;position:relative;overflow:hidden;}
.job-rec-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:var(--radius) 0 0 var(--radius);}
.job-rec-card:hover{border-color:var(--bord2);transform:translateX(4px);}
.jrc-top{display:flex;align-items:flex-start;gap:16px;margin-bottom:14px;}
.jrc-rank{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:900;flex-shrink:0;color:#fff;}
.jrc-info{flex:1;}
.jrc-title{font-size:18px;font-weight:900;margin-bottom:4px;}
.jrc-eng{font-size:11px;color:var(--sub);font-family:'JetBrains Mono',monospace;}
.jrc-score{font-size:13px;font-weight:700;margin-left:auto;flex-shrink:0;padding:4px 12px;
  border-radius:20px;border:1.5px solid;}
.jrc-desc{font-size:13px;color:var(--sub);line-height:1.75;margin-bottom:14px;}
.jrc-match{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
.match-tag{padding:4px 11px;border-radius:8px;font-size:11px;font-weight:700;}
.match-h{background:rgba(124,111,224,.15);color:#b8b0ff;}
.match-a{background:rgba(62,184,160,.15);color:#7fe8d0;}
.match-v{background:rgba(224,96,144,.15);color:#ffaad0;}
.jrc-jobs-title{font-size:12px;color:var(--muted);font-weight:700;margin-bottom:8px;}
.jrc-jobs-grid{display:flex;flex-wrap:wrap;gap:6px;}
.jrc-job{padding:5px 11px;border-radius:var(--rxs);font-size:12px;font-weight:600;
  background:var(--sur2);color:var(--sub);border:1px solid var(--bord);}

/* 3종 요약 */
.summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:22px;}
.sum-card{background:var(--sur);border:1px solid var(--bord);border-radius:var(--rsm);padding:18px 16px;}
.sum-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.sum-em{font-size:20px;}
.sum-title{font-size:12px;font-weight:800;color:var(--sub);}
.sum-top{font-size:15px;font-weight:900;margin-bottom:6px;}
.sum-tags{display:flex;flex-wrap:wrap;gap:5px;}
.sum-tag{padding:3px 8px;border-radius:6px;font-size:10px;font-weight:600;background:var(--sur2);color:var(--sub);}

/* 분석 방법 */
.algo-card{background:var(--sur);border:1px solid var(--bord);border-radius:var(--rsm);
  padding:20px 24px;margin-bottom:22px;}
.algo-title{font-size:13px;font-weight:800;color:var(--sub);margin-bottom:12px;}
.algo-steps{display:flex;flex-direction:column;gap:8px;}
.algo-step{display:flex;align-items:flex-start;gap:10px;font-size:12px;color:var(--sub);line-height:1.6;}
.algo-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);flex-shrink:0;margin-top:5px;}

.btn-retry{display:block;margin:0 auto;padding:14px 36px;background:linear-gradient(135deg,var(--H),var(--val));
  color:#fff;border:none;border-radius:var(--rsm);font-size:15px;font-weight:700;font-family:inherit;
  cursor:pointer;box-shadow:0 4px 16px rgba(124,111,224,.35);transition:all .2s;}
.btn-retry:hover{transform:translateY(-2px);filter:brightness(1.1);}

@media(max-width:600px){
  .intro-cards{grid-template-columns:1fr;}
  .name-row{flex-direction:column;}
  .summary-grid{grid-template-columns:1fr;}
  .rh-badges{flex-direction:column;align-items:center;}
  .jrc-top{flex-wrap:wrap;}
}

/* ════ LIGHT THEME OVERRIDE ════ */
body { background: var(--bg) !important; color: var(--t1) !important; }

/* 배경 오브 / 그리드 투명도 조절 */
.orb, .glow, .mesh-orb { opacity: 0.07 !important; }
.bg-grid, .grid-pat {
  background-image: linear-gradient(rgba(0,0,0,.04) 1px,transparent 1px),
                    linear-gradient(90deg,rgba(0,0,0,.04) 1px,transparent 1px) !important;
}

/* 카드 / 서피스 */
.exam-card, .q-card, .q-card, .plan-card, .adv-card,
.form-card, .result-hero, .res-hero, .rh-top,
.sum-card, .algo-card, .jobs-rec-card, .advice-card,
.job-rec-card, .compare-table, .faq-item, .all-banner,
.type-card, .apt-detail-card, .orient-result-card,
.value-profile-card, .radar-card, .profile-card,
.adv-header, .job-sel-card, .i-card, .modal {
  background: #ffffff !important;
  border-color: rgba(0,0,0,0.10) !important;
  box-shadow: 0 2px 14px rgba(0,0,0,0.07) !important;
}
.exam-card:hover, .plan-card:hover, .job-sel-card:hover {
  box-shadow: 0 6px 24px rgba(0,0,0,0.12) !important;
}

/* 서피스2 요소 */
.meta-chip, .type-tag, .card-types .type-tag,
.sum-tag, .adv-tag, .modal-info-chip,
.jrc-job, .all-tag, .td-file,
.all-tag, .nav-chip, .hd-btn, .api-status,
.sms-preview, .question-card,
.score-bar-track, .vbl-track, .prog-bg,
.prog-bar-bg, .profile-track, .salary-bg,
.likert-wrap, .q-hd, .q-head,
.faq-a, .adc-tag, .orc-val-tag, .adv-tag,
.gauge-item, .action-item, .chk-item,
.priority-box, .info-box, .tl-step,
.intro-stats, .hero-stats, .modal-info-row,
.sender-info, .selected-bar,
.lk-ball, .likert-ball, .likert-dot {
  background: #f0f3fa !important;
  border-color: rgba(0,0,0,0.10) !important;
}

/* 입력 필드 */
input, select, textarea,
.finput, .fselect, .ftextarea,
.modal-name-input, .modal-select-input,
.minput, .m-input,
.name-inp, .name-input,
.search-input, .custom-inp,
.form-input, .form-select, .form-textarea {
  background: #ffffff !important;
  border-color: rgba(0,0,0,0.15) !important;
  color: #1a1d2e !important;
}
input::placeholder, textarea::placeholder { color: #9299b8 !important; }
select option { background: #ffffff !important; color: #1a1d2e !important; }

/* 텍스트 */
.text-sub, .card-sub, .hero-sub, .intro-sub,
p, .t2, .sub, .text-muted, .muted,
.q-text, .q-txt, .lk-sc, .likert-scale,
.exam-hd-sub, .pc-sub, .adv-hd-sub,
.jrc-desc, .jrc-eng, .adc-desc,
.orc-desc, .adv-card-title, .faq-a,
.algo-step, .ai-out p, .ai-out li,
.loading-msg, .ans-st, .ans-status {
  color: #5a607a !important;
}

/* 헤더 / 탭 */
.site-header, .site-hd, .hd, .exam-hd, .exam-top, .tabs,
.header-nav, .stepper {
  background: #ffffff !important;
  border-color: rgba(0,0,0,0.09) !important;
  box-shadow: 0 1px 8px rgba(0,0,0,0.06) !important;
}
.tab-btn { color: #5a607a !important; }
.tab-btn.active { background: #e8ecf6 !important; color: #1a1d2e !important; }
.tab-btn:hover { background: #f0f3fa !important; }

/* 모달 오버레이 */
.modal-overlay.active, .moverlay.open { background: rgba(0,0,0,0.35) !important; }
.modal, .modal-overlay .modal { background: #ffffff !important; }
.modal-header, .mhd { border-color: rgba(0,0,0,0.08) !important; }

/* 비교표 */
.compare-table th { background: #f0f3fa !important; color: #5a607a !important; }
.compare-table td { color: #5a607a !important; }
.compare-table tr:hover td { background: #f8faff !important; }

/* 섹션 레이블 */
.section-label, .sec-label, .sec-lbl, .sec-div {
  color: #9299b8 !important;
}

// ── 헬퍼 ──
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}
function setStep(n){
  for(let i=0;i<=4;i++){
    const st=document.getElementById('st'+i);
    st.classList.remove('active','done');
    if(i<n) st.classList.add('done');
    else if(i===n) st.classList.add('active');
    if(i<4){const sl=document.getElementById('sl'+i);sl.classList.toggle('done',i<n);}
  }
}

// 1. 인트로 → 흥미검사 시작
// ══════════════════════════════════════════════════════════
function startAll(){
  uName=document.getElementById('userNameInp').value.trim()||'학생';
  // 흥미검사 페이지 구성
  const all=[];
  for(let i=0;i<6;i++) H_TYPES.forEach(t=>{const qs=H_QS.filter(q=>q.t===t);if(qs[i])all.push({...qs[i],sec:'gen'});});
  const jobs=[];
  for(let i=0;i<6;i++) H_TYPES.forEach(t=>{const qs=H_QS.filter(q=>q.t===t&&q.id.startsWith('J'));if(qs[i])jobs.push({...qs[i],sec:'job'});});
  const fullH=[...all,...jobs];
  hPages=[];
  for(let i=0;i<fullH.length;i+=PAGE_SIZE) hPages.push(fullH.slice(i,i+PAGE_SIZE));
  hCurPage=0; hAnswers={};
  setStep(1);
  showScreen('hollandScreen');
  hRenderPage();
}

// ── 흥미검사 렌더 ──
function hRenderPage(){
  const pg=hPages[hCurPage], total=hPages.length;
  const pct=Math.round((hCurPage/total)*100);
  document.getElementById('hdHTit').textContent='🎨 직업흥미검사 (H형) — 1단계';
  document.getElementById('hdHSub').textContent=`${hCurPage+1} / ${total} 페이지`;
  document.getElementById('hProgFill').style.width=pct+'%';
  document.getElementById('hProgLbl').textContent=`${hCurPage+1}/${total}`;
  document.getElementById('hProgPct').textContent=pct+'%';
  document.getElementById('hDots').innerHTML=hPages.map((_,i)=>{let c='dot';if(i<hCurPage)c+=' done';else if(i===hCurPage)c+=' cur';return`<div class="${c}" style="${i===hCurPage?'background:var(--H)':''}"></div>`;}).join('');
  // 섹션 구분
  const isJob=pg[0].sec==='job';
  document.getElementById('hSecDiv').innerHTML=`<div class="sec-div" style="background:rgba(124,111,224,.08);border-color:rgba(124,111,224,.25);color:#b8b0ff">
    <span class="sec-div-icon">${isJob?'💼':'🎯'}</span>
    <div><div class="sec-div-title">${isJob?'파트 2 — 선호직업':'파트 1 — 일반흥미'}</div>
    <div class="sec-div-desc">${isJob?'다음 직업들에 얼마나 관심이 있는지 응답해 주세요':'평소 활동에 얼마나 흥미를 느끼는지 응답해 주세요'}</div></div></div>`;
  const scaleLbls=['전혀\n아니다','아니다','보통','그렇다','매우\n그렇다'];
  const startIdx=hCurPage*PAGE_SIZE;
  document.getElementById('hQArea').innerHTML=pg.map((q,i)=>{
    const gIdx=startIdx+i+1;const info=H_INFO[q.t];const saved=hAnswers[q.id];
    return`<div class="q-card"><div class="q-hd">
      <div class="q-num" style="background:${info.color}">${gIdx}</div>
      <div class="q-txt">${q.tx}</div>
      <div class="q-tag" style="background:${info.color}22;color:${info.color}">${info.emoji}${info.name}형</div>
    </div><div class="likert">
      <span class="lbl">전혀 아니다</span>
      <div class="opts">${[1,2,3,4,5].map((v,vi)=>`<div class="opt"><label>
        <input type="radio" class="lk-radio" name="hq_${q.id}" value="${v}" ${saved===v?'checked':''} onchange="hSave('${q.id}',${v})">
        <div class="lk-ball">${v}</div></label>
        <div class="lk-sc">${scaleLbls[vi]}</div></div>`).join('')}</div>
      <span class="lbl">매우 그렇다</span>
    </div></div>`;
  }).join('');
  hUpdateNav();
}
function hSave(id,v){hAnswers[id]=v;hUpdateNav();}
function hUpdateNav(){
  const pg=hPages[hCurPage];
  const done=pg.filter(q=>hAnswers[q.id]!==undefined).length;
  document.getElementById('hAnsSt').textContent=`${done}/${pg.length} 응답`;
  document.getElementById('hBtnPrev').style.visibility=hCurPage===0?'hidden':'visible';
  const isLast=hCurPage===hPages.length-1;
  document.getElementById('hBtnNext').textContent=isLast?'적성검사로 →':'다음 →';
  document.getElementById('hBtnNext').disabled=done<pg.length;
}
function hGoPage(d){
  const np=hCurPage+d;
  if(np<0)return;
  if(np>=hPages.length){startApt();return;}
  hCurPage=np;hRenderPage();
}

// ══════════════════════════════════════════════════════════
// 2. 적성검사
// ══════════════════════════════════════════════════════════
function startApt(){
  aPages=[]; aAnswers={};
  A_IDS.forEach(id=>aPages.push(A_QS.filter(q=>q.a===id)));
  aCurPage=0;
  setStep(2);
  showScreen('aptScreen');
  aRenderPage();
}
function aRenderPage(){
  const pg=aPages[aCurPage]; const total=aPages.length;
  const aptId=A_IDS[aCurPage]; const info=A_INFO[aptId];
  const pct=Math.round((aCurPage/total)*100);
  document.getElementById('hdATit').textContent=`🎯 직업적성검사 — 2단계`;
  document.getElementById('hdASub').textContent=`${aCurPage+1} / ${total} 영역 — ${info.em} ${aptId}`;
  document.getElementById('aProgFill').style.width=pct+'%';
  document.getElementById('aProgLbl').textContent=`${aCurPage+1}/${total}`;
  document.getElementById('aProgPct').textContent=pct+'%';
  document.getElementById('aDots').innerHTML=A_IDS.map((_,i)=>{let c='dot';if(i<aCurPage)c+=' done';else if(i===aCurPage)c+=' cur';return`<div class="${c}" style="${i===aCurPage?'background:var(--apt)':''}"></div>`;}).join('');
  document.getElementById('aSecDiv').innerHTML=`<div class="sec-div" style="background:rgba(62,184,160,.08);border-color:rgba(62,184,160,.25);color:#7fe8d0">
    <span class="sec-div-icon">${info.em}</span>
    <div><div class="sec-div-title">${aptId}</div></div></div>`;
  const scaleLbls=['전혀\n아니다','아니다','보통','그렇다','매우\n그렇다'];
  const startIdx=aCurPage*6;
  document.getElementById('aQArea').innerHTML=pg.map((q,i)=>{
    const saved=aAnswers[q.id];
    return`<div class="q-card"><div class="q-hd">
      <div class="q-num" style="background:${info.c}">${startIdx+i+1}</div>
      <div class="q-txt">${q.tx}</div>
      <div class="q-tag" style="background:${info.c}22;color:${info.c}">${info.em} ${aptId}</div>
    </div><div class="likert">
      <span class="lbl">전혀 아니다</span>
      <div class="opts">${[1,2,3,4,5].map((v,vi)=>`<div class="opt"><label>
        <input type="radio" class="lk-radio" name="aq_${q.id}" value="${v}" ${saved===v?'checked':''} onchange="aSave('${q.id}',${v})">
        <div class="lk-ball">${v}</div></label>
        <div class="lk-sc">${scaleLbls[vi]}</div></div>`).join('')}</div>
      <span class="lbl">매우 그렇다</span>
    </div></div>`;
  }).join('');
  aUpdateNav();
}
function aSave(id,v){aAnswers[id]=v;aUpdateNav();}
function aUpdateNav(){
  const pg=aPages[aCurPage];
  const done=pg.filter(q=>aAnswers[q.id]!==undefined).length;
  document.getElementById('aAnsSt').textContent=`${done}/${pg.length} 응답`;
  document.getElementById('aBtnPrev').style.visibility=aCurPage===0?'hidden':'visible';
  const isLast=aCurPage===aPages.length-1;
  document.getElementById('aBtnNext').textContent=isLast?'가치관검사로 →':'다음 →';
  document.getElementById('aBtnNext').disabled=done<pg.length;
}
function aGoPage(d){
  const np=aCurPage+d;
  if(np<0)return;
  if(np>=aPages.length){startVal();return;}
  aCurPage=np;aRenderPage();
}

// ══════════════════════════════════════════════════════════
// 3. 가치관검사
// ══════════════════════════════════════════════════════════
function startVal(){
  vPages=[]; vAnswers={};
  const shuffled=[];
  for(let i=0;i<5;i++) V_IDS.forEach(id=>{const qs=V_QS.filter(q=>q.v===id);if(qs[i])shuffled.push(qs[i]);});
  for(let i=0;i<shuffled.length;i+=PAGE_SIZE) vPages.push(shuffled.slice(i,i+PAGE_SIZE));
  vCurPage=0;
  setStep(3);
  showScreen('valScreen');
  vRenderPage();
}
function vRenderPage(){
  const pg=vPages[vCurPage]; const total=vPages.length;
  const pct=Math.round((vCurPage/total)*100);
  document.getElementById('hdVSub').textContent=`${vCurPage+1} / ${total} 페이지`;
  document.getElementById('vProgFill').style.width=pct+'%';
  document.getElementById('vProgLbl').textContent=`${vCurPage+1}/${total}`;
  document.getElementById('vProgPct').textContent=pct+'%';
  document.getElementById('vDots').innerHTML=vPages.map((_,i)=>{let c='dot';if(i<vCurPage)c+=' done';else if(i===vCurPage)c+=' cur';return`<div class="${c}" style="${i===vCurPage?'background:var(--val)':''}"></div>`;}).join('');
  const scaleLbls=['전혀\n아니다','아니다','보통','그렇다','매우\n그렇다'];
  const startIdx=vCurPage*PAGE_SIZE;
  const VCOL={안정성:'#1e88e5',보수:'#0288d1',일과삶의균형:'#00897b',능력발휘:'#ef6c00',사회적인정:'#e53935',성취감:'#8e24aa',사회봉사:'#43a047',대인관계:'#fb8c00',소속감:'#d81b60',자율성:'#6d4c41',자기계발:'#546e7a',창의성:'#00acc1'};
  const VEMOJI={안정성:'🛡️',보수:'💰',일과삶의균형:'⚖️',능력발휘:'⚡',사회적인정:'🏅',성취감:'🎯',사회봉사:'❤️',대인관계:'👥',소속감:'🏘️',자율성:'🕊️',자기계발:'📈',창의성:'✨'};
  document.getElementById('vQArea').innerHTML=pg.map((q,i)=>{
    const c=VCOL[q.v]||'#888'; const em=VEMOJI[q.v]||'●'; const saved=vAnswers[q.id];
    return`<div class="q-card"><div class="q-hd">
      <div class="q-num" style="background:${c}">${startIdx+i+1}</div>
      <div class="q-txt">${q.tx}</div>
      <div class="q-tag" style="background:${c}22;color:${c}">${em} ${q.v}</div>
    </div><div class="likert">
      <span class="lbl">전혀 아니다</span>
      <div class="opts">${[1,2,3,4,5].map((v,vi)=>`<div class="opt"><label>
        <input type="radio" class="lk-radio" name="vq_${q.id}" value="${v}" ${saved===v?'checked':''} onchange="vSave('${q.id}',${v})">
        <div class="lk-ball">${v}</div></label>
        <div class="lk-sc">${scaleLbls[vi]}</div></div>`).join('')}</div>
      <span class="lbl">매우 그렇다</span>
    </div></div>`;
  }).join('');
  vUpdateNav();
}
function vSave(id,v){vAnswers[id]=v;vUpdateNav();}
function vUpdateNav(){
  const pg=vPages[vCurPage];
  const done=pg.filter(q=>vAnswers[q.id]!==undefined).length;
  document.getElementById('vAnsSt').textContent=`${done}/${pg.length} 응답`;
  document.getElementById('vBtnPrev').style.visibility=vCurPage===0?'hidden':'visible';
  const isLast=vCurPage===vPages.length-1;
  document.getElementById('vBtnNext').textContent=isLast?'결과 보기 ✨':'다음 →';
  document.getElementById('vBtnNext').disabled=done<pg.length;
}
function vGoPage(d){
  const np=vCurPage+d;
  if(np<0)return;
  if(np>=vPages.length){showFinalResult();return;}
  vCurPage=np;vRenderPage();
}

// ══════════════════════════════════════════════════════════
// 4. 종합 결과 + 직업군 추천
// ══════════════════════════════════════════════════════════
function showFinalResult(){
  setStep(4);

  // ── 흥미 점수 ──
  const hPct={};
  H_TYPES.forEach(t=>{
    const qs=H_QS.filter(q=>q.t===t);
    const sum=qs.reduce((s,q)=>s+(hAnswers[q.id]||0),0);
    hPct[t]=Math.round((sum/(qs.length*5))*100);
  });
  const hSorted=H_TYPES.slice().sort((a,b)=>hPct[b]-hPct[a]);
  const hTop2=[hSorted[0],hSorted[1]];

  // ── 적성 점수 ──
  const aPct={};
  A_IDS.forEach(id=>{
    const qs=A_QS.filter(q=>q.a===id);
    const sum=qs.reduce((s,q)=>s+(aAnswers[q.id]||0),0);
    aPct[id]=Math.round((sum/(qs.length*5))*100);
  });
  const aSorted=A_IDS.slice().sort((a,b)=>aPct[b]-aPct[a]);
  const aTop3=aSorted.slice(0,3);

  // ── 가치관 점수 ──
  const vPct={};
  V_IDS.forEach(id=>{
    const qs=V_QS.filter(q=>q.v===id);
    const sum=qs.reduce((s,q)=>s+(vAnswers[q.id]||0),0);
    vPct[id]=Math.round((sum/(qs.length*5))*100);
  });
  const vOrientPct={};
  Object.keys(V_ORIENTS).forEach(ok=>{
    const avg=Math.round(V_ORIENTS[ok].reduce((s,v)=>s+vPct[v],0)/V_ORIENTS[ok].length);
    vOrientPct[ok]=avg;
  });
  const vTopOrient=Object.keys(vOrientPct).sort((a,b)=>vOrientPct[b]-vOrientPct[a])[0];
  const vTop2Orients=Object.keys(vOrientPct).sort((a,b)=>vOrientPct[b]-vOrientPct[a]).slice(0,2);

  // ══════════════════════════════════
  // 직업군 점수 계산 (교차 매핑)
  // ══════════════════════════════════
  const jobScores=JOB_GROUPS.map(jg=>{
    let score=0;
    // 흥미 (40%)
    const hMatch=hTop2.filter(t=>jg.h.includes(t)).length;
    score += (hMatch/2)*40;
    if(hMatch===0){
      // 2순위 흥미 체크
      const h3=hSorted[2];
      if(jg.h.includes(h3)) score+=10;
    }
    // 적성 (35%)
    const aMatch=aTop3.filter(a=>jg.a.includes(a)).length;
    score += (aMatch/Math.min(3,jg.a.length))*35;
    // 가치관 (25%)
    const vMatch=vTop2Orients.filter(o=>jg.v.includes(o)).length;
    score += (vMatch/2)*25;
    // 보너스: 흥미·적성 동시 높은 경우
    if(hMatch>=2 && aMatch>=2) score+=8;
    if(hMatch>=1 && aMatch>=2 && vMatch>=1) score+=5;
    return{...jg, score:Math.min(100,Math.round(score)),
      hMatch, aMatch, vMatch,
      matchH: hTop2.filter(t=>jg.h.includes(t)),
      matchA: aTop3.filter(a=>jg.a.includes(a)),
      matchV: vTop2Orients.filter(o=>jg.v.includes(o))
    };
  }).sort((a,b)=>b.score-a.score);

  // 상위 3~5개 추출 (점수 0 제외, 최소 3개 보장)
  let topJobs=jobScores.filter(j=>j.score>0).slice(0,5);
  if(topJobs.length<3) topJobs=jobScores.slice(0,3);

  // ── 결과 렌더링 ──
  const rankColors=['#f0a050','#94a3b8','#cd7f32','#64748b','#475569'];
  const rankLabels=['🥇 1위','🥈 2위','🥉 3위','4위','5위'];

  const html=`
    <div class="res-hero">
      <div class="rh-label">3종 통합 검사 결과</div>
      <div class="rh-name">${uName} 님의 맞춤 직업군 추천</div>
      <div class="rh-badges">
        <div class="rh-badge" style="background:rgba(124,111,224,.2);border-color:rgba(124,111,224,.4);color:#b8b0ff">
          🎨 흥미코드 ${hTop2.join('')}형
        </div>
        <div class="rh-badge" style="background:rgba(62,184,160,.2);border-color:rgba(62,184,160,.4);color:#7fe8d0">
          🎯 상위적성 ${aTop3.slice(0,2).join(' · ')}
        </div>
        <div class="rh-badge" style="background:rgba(224,96,144,.2);border-color:rgba(224,96,144,.4);color:#ffaad0">
          ⚖️ ${vTopOrient}지향
        </div>
      </div>
      <div class="rh-sub">세 검사 결과를 교차 분석하여 아래 ${topJobs.length}개 직업군을 추천합니다</div>
    </div>

    <!-- 3종 요약 -->
    <div class="summary-grid">
      <div class="sum-card">
        <div class="sum-head"><span class="sum-em">🎨</span><div class="sum-title">직업흥미 코드</div></div>
        <div class="sum-top">${hTop2.map(t=>H_INFO[t].emoji+H_INFO[t].name+'형').join(' + ')}</div>
        <div class="sum-tags">${hSorted.slice(0,3).map(t=>`<span class="sum-tag">${H_INFO[t].emoji}${t}(${hPct[t]}%)</span>`).join('')}</div>
      </div>
      <div class="sum-card">
        <div class="sum-head"><span class="sum-em">🎯</span><div class="sum-title">상위 적성 영역</div></div>
        <div class="sum-top">${A_INFO[aTop3[0]].em} ${aTop3[0]}</div>
        <div class="sum-tags">${aTop3.map(a=>`<span class="sum-tag">${A_INFO[a].em}${a}(${aPct[a]}%)</span>`).join('')}</div>
      </div>
      <div class="sum-card">
        <div class="sum-head"><span class="sum-em">⚖️</span><div class="sum-title">가치지향 유형</div></div>
        <div class="sum-top">${{안전:'🛡️',성취:'🏆',관계:'🤝',자기표현:'🌈'}[vTopOrient]} ${vTopOrient}지향</div>
        <div class="sum-tags">${Object.keys(vOrientPct).sort((a,b)=>vOrientPct[b]-vOrientPct[a]).slice(0,3).map(o=>`<span class="sum-tag">${o}(${vOrientPct[o]}%)</span>`).join('')}</div>
      </div>
    </div>

    <!-- 직업군 추천 -->
    <div class="job-rec-section">
      <div class="sec-title">✨ 추천 직업군 (${topJobs.length}개)</div>
      <div class="job-rec-grid">
        ${topJobs.map((jg,i)=>`
        <div class="job-rec-card" style="border-color:${jg.color}30">
          <div style="position:absolute;left:0;top:0;bottom:0;width:4px;background:${jg.color};border-radius:18px 0 0 18px"></div>
          <div class="jrc-top">
            <div class="jrc-rank" style="background:${rankColors[i]}">${i+1}</div>
            <div class="jrc-info">
              <div class="jrc-title" style="color:${jg.color}">${jg.emoji} ${jg.name}</div>
              <div class="jrc-eng">${jg.eng}</div>
            </div>
            <div class="jrc-score" style="color:${jg.color};border-color:${jg.color}40;background:${jg.color}12">
              ${rankLabels[i]} · ${jg.score}점
            </div>
          </div>
          <div class="jrc-desc">${jg.desc}</div>
          <div class="jrc-match">
            ${jg.matchH.length?`<span class="match-tag match-h">🎨 흥미: ${jg.matchH.map(t=>H_INFO[t].name+'형').join('·')}</span>`:''}
            ${jg.matchA.length?`<span class="match-tag match-a">🎯 적성: ${jg.matchA.join('·')}</span>`:''}
            ${jg.matchV.length?`<span class="match-tag match-v">⚖️ 가치: ${jg.matchV.join('·')}지향</span>`:''}
          </div>
          <div class="jrc-jobs-title">🏢 대표 직업</div>
          <div class="jrc-jobs-grid">${jg.jobs.map(j=>`<div class="jrc-job">${j}</div>`).join('')}</div>
        </div>`).join('')}
      </div>
    </div>

    <!-- 분석 방법 -->
    <div class="algo-card">
      <div class="algo-title">🔍 직업군 추천 분석 방법</div>
      <div class="algo-steps">
        <div class="algo-step"><div class="algo-dot"></div>흥미(40%) — Holland 상위 2개 유형이 직업군 흥미 요소와 일치하는 정도</div>
        <div class="algo-step"><div class="algo-dot"></div>적성(35%) — 상위 3개 적성 영역이 직업군 핵심 능력과 일치하는 정도</div>
        <div class="algo-step"><div class="algo-dot"></div>가치관(25%) — 상위 2개 가치지향이 직업군 특성과 맞는 정도</div>
        <div class="algo-step"><div class="algo-dot"></div>흥미·적성이 동시에 높게 일치하면 보너스 점수 부여</div>
      </div>
    </div>

    <button class="btn-retry" onclick="retryAll()">🔄 처음부터 다시 검사하기</button>
  `;

  document.getElementById('resultScreen').innerHTML=html;
